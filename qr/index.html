<title>Tiempos — QR</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%235E8153'/><text x='50' y='72' font-size='64' text-anchor='middle' font-family='Georgia,serif' font-weight='bold' fill='%23F6F1E7'>é</text></svg>">
<style>
  :root {
    --bg: #F6F1E7; --card: #FFFFFF; --ink: #2B2721; --ink-soft: #7d7466;
    --sage: #5E8153; --line: #E3DAC8;
    --shadow: 0 24px 60px -24px rgba(58, 52, 39, 0.35);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #211E18; --card: #2E2A22; --ink: #F0EADC; --ink-soft: #A89F8D;
      --sage: #93B285; --line: #3C372D;
      --shadow: 0 24px 60px -24px rgba(0, 0, 0, 0.6);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100svh;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px;
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    font-size: 17px; line-height: 1.6; -webkit-font-smoothing: antialiased;
    padding: 32px; text-align: center;
  }
  .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 19px; letter-spacing: -0.2px; color: inherit; text-decoration: none; }
  .logo-mark {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(180deg, #F8F4EB, #EFE8D8);
    border: 1px solid var(--line);
    display: grid; place-items: center;
    font-family: Georgia, serif; font-weight: 700; font-size: 24px; color: #5E8153;
  }
  .qr {
    width: min(280px, 70vw); height: auto; display: block;
    color: #2B2721; background: #FFFCF5;
    border: 1px solid var(--line); border-radius: 24px;
    box-shadow: var(--shadow);
  }
  p { margin: 0; color: var(--ink-soft); max-width: 34ch; }
  p b { color: var(--ink); font-weight: 600; }
  a.fallback { color: var(--sage); text-decoration: none; font-size: 15px; }
  a.fallback:hover { text-decoration: underline; }
  @media (prefers-reduced-motion: no-preference) {
    body > * { opacity: 0; transform: translateY(14px); animation: rise 0.7s cubic-bezier(0.2, 0.7, 0.2, 1) forwards; }
    body > *:nth-child(2) { animation-delay: 0.12s; }
    body > *:nth-child(3) { animation-delay: 0.24s; }
    body > *:nth-child(4) { animation-delay: 0.34s; }
    @keyframes rise { to { opacity: 1; transform: none; } }
  }
</style>
</head>

<script>
  const T = {
    en: { hint: "Point your iPhone camera at the code — the App Store page will open.", fallback: "Or open the App Store in your browser" },
    ru: { hint: "Наведите камеру iPhone на код — откроется страница в App Store.", fallback: "Или откройте App Store в браузере" },

  const lang = localStorage.getItem("tiempos-lang") || (navigator.language && navigator.language.startsWith("ru") ? "ru" : "en");
